workflows:
  android_release:
    name: BOUH Android Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      groups:
        - bouh_signing
      vars:
        PROJECT_NAME: bouh_supreme_udc_enterprise
    scripts:
      - name: Ensure Flutter platforms exist
        script: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create --platforms=android,ios --project-name bouh_supreme_udc_enterprise .
          fi
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com
        notify:
          success: true
          failure: true

  ios_release:
    name: BOUH iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 180
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - bouh_signing
      vars:
        PROJECT_NAME: bouh_supreme_udc_enterprise
    scripts:
      - name: Ensure Flutter platforms exist
        script: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create --platforms=android,ios --project-name bouh_supreme_udc_enterprise .
          fi
      - name: Get dependencies
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com
        notify:
          success: true
          failure: true
