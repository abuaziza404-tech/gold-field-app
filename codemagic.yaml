workflows:
  android_debug:
    name: BOUH Android Debug
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
    scripts:
      - name: Ensure Android platform exists
        script: |
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug)
        script: flutter build apk --debug
      - name: Collect APK
        script: |
          mkdir -p artifacts/android
          cp build/app/outputs/flutter-apk/app-debug.apk artifacts/android/ || true
    artifacts:
      - artifacts/android/*.apk
      - build/app/outputs/flutter-apk/*.apk

  ios_debug_unsigned:
    name: BOUH iOS Debug Unsigned
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Ensure iOS platform exists
        script: |
          if [ ! -d ios ]; then
            flutter create --platforms=ios .
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install Pods
        script: |
          if [ -f ios/Podfile ]; then
            cd ios && pod install
          fi
      - name: Build iOS debug without codesign
        script: flutter build ios --debug --no-codesign
      - name: Collect iOS app bundle
        script: |
          mkdir -p artifacts/ios
          cp -R build/ios/iphoneos/*.app artifacts/ios/ || true
          cp -R build/ios/Build/Products/Debug-iphoneos/*.app artifacts/ios/ || true
    artifacts:
      - artifacts/ios/*.app
      - build/ios/iphoneos/*.app
      - build/ios/Build/Products/Debug-iphoneos/*.app
