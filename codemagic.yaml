workflows:
  bouh_universal_debug:
    name: BOUH Universal Build (APK + iOS)
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:

      - name: Clean project
        script: |
          flutter clean

      - name: Get dependencies
        script: |
          flutter pub get

      - name: Ensure platforms exist
        script: |
          flutter create .

      - name: Fix iOS Pods
        script: |
          cd ios
          pod install
          cd ..

      # 🔴 Build Android APK
      - name: Build APK
        script: |
          flutter build apk --debug

      # 🔴 Build iOS (بدون توقيع)
      - name: Build iOS
        script: |
          flutter build ios --debug --no-codesign

      # 🔴 جمع الملفات (Smart Copy)
      - name: Collect Artifacts
        script: |
          mkdir -p artifacts/android
          mkdir -p artifacts/ios

          echo "Copying APK..."
          cp build/app/outputs/flutter-apk/*.apk artifacts/android/ || true

          echo "Searching for iOS app..."
          APP_PATH=$(find build/ios -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found"
            ls -R build/ios
          else
            echo "✅ Found app at: $APP_PATH"
            cp -R "$APP_PATH" artifacts/ios/
          fi

    artifacts:
      - artifacts/android/*.apk
      - artifacts/ios/*.app
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/**/*.app
