class HomePage extends StatelessWidget {
  const HomePage({super.key});

  Color _statusColor(String decision) {
    if (decision.contains('TARGET-B')) return Colors.redAccent;
    if (decision.contains('HIGH')) return Colors.orangeAccent;
    if (decision.contains('HOLD')) return Colors.blueAccent;
    if (decision.contains('REJECT')) return Colors.grey;
    return Colors.greenAccent;
  }

  @override
  Widget build(BuildContext context) {
    final sorted = [...targets]..sort((a, b) => b.score.compareTo(a.score));

    return Scaffold(
      appBar: AppBar(
        title: const Text('بوح التضاريس'),
        centerTitle: true,
      ),
      body: ListView(
        padding: const EdgeInsets.all(16),
        children: [
          const Text(
            'BOUH SUPREME ENGINE',
            style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
            textAlign: TextAlign.center,
          ),
          const SizedBox(height: 6),
          const Text(
            'Ahmed Abuaziza Al-Rasheedi',
            style: TextStyle(fontSize: 16),
            textAlign: TextAlign.center,
          ),
          const SizedBox(height: 20),
          const Card(
            child: Padding(
              padding: EdgeInsets.all(14),
              child: Text(
                'القانون التشغيلي: Structure → Pattern → Alteration → Confirmation → Decision\n\n'
                'No Structure = Reject\n'
                'No Clay/SWIR = HOLD\n'
                'Spectral alone = Reject\n'
                'Field + GeoChem = Final Truth',
                style: TextStyle(fontSize: 15),
              ),
            ),
          ),
          const SizedBox(height: 16),
          ...sorted.map((t) {
            final decision = t.decision;
            return Card(
              margin: const EdgeInsets.only(bottom: 14),
              child: Padding(
                padding: const EdgeInsets.all(14),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Text(
                      t.name,
                      style: const TextStyle(
                        fontSize: 19,
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                    const SizedBox(height: 6),
                    Text('Type: ${t.type}'),
                    Text('GPS: ${t.lat.toStringAsFixed(4)}, ${t.lon.toStringAsFixed(4)}'),
                    const SizedBox(height: 8),
                    LinearProgressIndicator(value: t.score.clamp(0.0, 1.0)),
                    const SizedBox(height: 8),
                    Text('P-Score: ${t.score.toStringAsFixed(3)}'),
                    Text('Structure: ${t.structure.toStringAsFixed(2)}'),
                    Text('Clay/SWIR: ${t.clay.toStringAsFixed(2)}'),
                    Text('Iron: ${t.iron.toStringAsFixed(2)}'),
                    Text('Silica/Quartz: ${t.silica.toStringAsFixed(2)}'),
                    const SizedBox(height: 10),
                    Container(
                      padding: const EdgeInsets.all(10),
                      decoration: BoxDecoration(
                        color: _statusColor(decision).withOpacity(0.18),
                        borderRadius: BorderRadius.circular(10),
                        border: Border.all(color: _statusColor(decision)),
                      ),
                      child: Text(
                        decision,
                        style: const TextStyle(fontWeight: FontWeight.bold),
                      ),
                    ),
                  ],
                ),
              ),
            );
          }),
          const SizedBox(height: 20),
          const Card(
            child: Padding(
              padding: EdgeInsets.all(14),
              child: Text(
                'بروتوكول الميدان:\n'
                '1) تحقق من shear / fault / intersection\n'
                '2) تحقق من quartz + iron + alteration\n'
                '3) لا تحفر من اللون وحده\n'
                '4) خذ عينات من vein + wall rock\n'
                '5) القرار النهائي يحتاج assay و QA/QC',
              ),
            ),
          ),
        ],
      ),
    );
  }
}
EOF
          fi

          if [ ! -d "android" ]; then
            echo "Android folder missing. Running flutter create ."
            flutter create .
          fi

      - name: Flutter pub get
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          PROJECT_DIR=$(dirname "$PUBSPEC")
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build APK
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          PROJECT_DIR=$(dirname "$PUBSPEC")
          cd "$PROJECT_DIR"
          flutter build apk --release

      - name: Prepare APK
        run: |
          mkdir -p dist
          APK_PATH=$(find . -path "*/build/app/outputs/flutter-apk/app-release.apk" | head -n 1)
          echo "APK path: $APK_PATH"
          cp "$APK_PATH" dist/bouh-altadaris.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bouh-altadaris-apk
          path: dist/bouh-altadaris.apk
