name: Build BOUH Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip uploaded package if exists
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Unzipping $ZIP_FILE"
            unzip -o "$ZIP_FILE"
          else
            echo "No zip file found"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Flutter project
        run: |
          echo "Locating pubspec.yaml..."
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC" ]; then
            echo "No pubspec.yaml found. Creating Flutter project..."
            flutter create bouh_app
            PROJECT_DIR="bouh_app"
          else
            PROJECT_DIR=$(dirname "$PUBSPEC")
            echo "Found Flutter project at $PROJECT_DIR"
          fi

          cd "$PROJECT_DIR"

          if [ ! -d "lib" ]; then
            mkdir -p lib
          fi

          if [ ! -f "lib/main.dart" ]; then
            cat > lib/main.dart <<'EOF'
import 'package:flutter/material.dart';

void main() {
  runApp(const BouhApp());
}

class BouhApp extends StatelessWidget {
  const BouhApp({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: 'بوح التضاريس',
      debugShowCheckedModeBanner: false,
      theme: ThemeData.dark(useMaterial3: true),
      home: const HomePage(),
    );
  }
}

class Target {
  final String name;
  final double lat;
  final double lon;
  final double structure;
  final double clay;
  final double iron;
  final double silica;
  final String type;

  const Target({
    required this.name,
    required this.lat,
    required this.lon,
    required this.structure,
    required this.clay,
    required this.iron,
    required this.silica,
    required this.type,
  });

  double get score {
    return (structure * 0.36) +
        (((clay + iron + silica) / 3) * 0.28) +
        (0.12 * 0.72) +
        (0.08 * 0.85) +
        (0.16 * 0.65);
  }

  String get decision {
    if (structure < 0.55) return 'REJECT — لا توجد بنية كافية';
    if (clay < 0.50) return 'HOLD — لا توجد SWIR/Clay كافية';
    if (score >= 0.80) return 'TARGET-B ELITE';
    if (score >= 0.70) return 'HIGH PRIORITY';
    return 'FIELD CHECK';
  }
}

