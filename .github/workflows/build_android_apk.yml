name: Build BOUH Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: |
          flutter create bouh_app

      - name: Write BOUH app
        run: |
          cat > bouh_app/lib/main.dart <<'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const BouhApp());
          }

          class BouhApp extends StatelessWidget {
            const BouhApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'BOUH Gold',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark(useMaterial3: true),
                home: const HomePage(),
              );
            }
          }

          class Target {
            final String name;
            final double lat;
            final double lon;
            final double structure;
            final double clay;
            final double iron;
            final double silica;
            final String type;

            const Target(
              this.name,
              this.lat,
              this.lon,
              this.structure,
              this.clay,
              this.iron,
              this.silica,
              this.type,
            );

            double get score {
              return structure * 0.36 +
                  ((clay + iron + silica) / 3) * 0.28 +
                  0.12 * 0.72 +
                  0.08 * 0.85 +
                  0.16 * 0.65;
            }

            String get decision {
              if (structure < 0.55) return 'REJECT - No structure';
              if (clay < 0.50) return 'HOLD - Weak SWIR/Clay';
              if (score >= 0.80) return 'TARGET-B ELITE';
              if (score >= 0.70) return 'HIGH PRIORITY';
              return 'FIELD CHECK';
            }
          }

          const targets = [
            Target('Gebeit Core Strike', 20.88, 36.06, 0.95, 0.89, 0.91, 0.84, 'Orogenic Lode'),
            Target('Sinkat Shear Cluster', 20.74, 36.18, 0.92, 0.81, 0.79, 0.75, 'Shear Intersection'),
            Target('Hashai Gossan', 19.18, 36.07, 0.84, 0.73, 0.95, 0.69, 'Gossan Gold'),
            Target('Ariab Extension', 18.76, 35.36, 0.88, 0.90, 0.76, 0.71, 'Sulfide Gold'),
            Target('Derbeikwan Placer', 18.72, 34.95, 0.66, 0.52, 0.68, 0.61, 'Placer / Wadi Trap'),
          ];

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            Color statusColor(String decision) {
              if (decision.contains('TARGET-B')) return Colors.redAccent;
              if (decision.contains('HIGH')) return Colors.orangeAccent;
              if (decision.contains('HOLD')) return Colors.blueAccent;
              if (decision.contains('REJECT')) return Colors.grey;
              return Colors.greenAccent;
            }

            @override
            Widget build(BuildContext context) {
              final sorted = [...targets]..sort((a, b) => b.score.compareTo(a.score));

              return Scaffold(
                appBar: AppBar(
                  title: const Text('بوح التضاريس'),
                  centerTitle: true,
                ),
                body: ListView(
                  padding: const EdgeInsets.all(16),
                  children: [
                    const Text(
                      'BOUH SUPREME ENGINE',
                      style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
                      textAlign: TextAlign.center,
                    ),
                    const SizedBox(height: 6),
                    const Text(
                      'Ahmed Abuaziza Al-Rasheedi',
                      textAlign: TextAlign.center,
                    ),
                    const SizedBox(height: 20),
                    const Card(
                      child: Padding(
                        padding: EdgeInsets.all(14),
                        child: Text(
                          'Structure -> Pattern -> Alteration -> Confirmation -> Decision\n\n'
                          'No Structure = Reject\n'
                          'No Clay/SWIR = HOLD\n'
                          'Spectral alone = Reject\n'
                          'Field + GeoChem = Final Truth',
                        ),
                      ),
                    ),
                    const SizedBox(height: 16),
                    for (final t in sorted)
                      Card(
                        margin: const EdgeInsets.only(bottom: 14),
                        child: Padding(
                          padding: const EdgeInsets.all(14),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              Text(
                                t.name,
                                style: const TextStyle(fontSize: 19, fontWeight: FontWeight.bold),
                              ),
                              const SizedBox(height: 6),
                              Text('Type: ${t.type}'),
                              Text('GPS: ${t.lat.toStringAsFixed(4)}, ${t.lon.toStringAsFixed(4)}'),
                              const SizedBox(height: 8),
                              LinearProgressIndicator(value: t.score.clamp(0.0, 1.0)),
                              const SizedBox(height: 8),
                              Text('P-Score: ${t.score.toStringAsFixed(3)}'),
                              Text('Structure: ${t.structure.toStringAsFixed(2)}'),
                              Text('Clay/SWIR: ${t.clay.toStringAsFixed(2)}'),
                              Text('Iron: ${t.iron.toStringAsFixed(2)}'),
                              Text('Silica/Quartz: ${t.silica.toStringAsFixed(2)}'),
                              const SizedBox(height: 10),
                              Container(
                                padding: const EdgeInsets.all(10),
                                decoration: BoxDecoration(
                                  color: statusColor(t.decision).withOpacity(0.18),
                                  borderRadius: BorderRadius.circular(10),
                                  border: Border.all(color: statusColor(t.decision)),
                                ),
                                child: Text(
                                  t.decision,
                                  style: const TextStyle(fontWeight: FontWeight.bold),
                                ),
                              ),
                            ],
                          ),
                        ),
                      ),
                    const Card(
                      child: Padding(
                        padding: EdgeInsets.all(14),
                        child: Text(
                          'Field Protocol:\n'
                          '1. Verify shear / fault / intersection\n'
                          '2. Verify quartz + iron + alteration\n'
                          '3. Do not dig from color alone\n'
                          '4. Sample vein + wall rock\n'
                          '5. Final decision requires assay and QA/QC',
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: |
          cd bouh_app
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bouh-altadaris-apk
          path: bouh_app/build/app/outputs/flutter-apk/app-release.apk
