name: Build BOUH Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source package if exists
        run: |
          if [ -f "bouh_altadaris_android_ready.zip" ]; then
            unzip -o bouh_altadaris_android_ready.zip
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Find Flutter project
        run: |
          echo "Searching for pubspec.yaml..."
          find . -name "pubspec.yaml"

      - name: Get dependencies
        run: |
          PROJECT_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build APK
        run: |
          PROJECT_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          cd "$PROJECT_DIR"
          flutter build apk --release

      - name: Prepare APK
        run: |
          mkdir -p dist
          APK_PATH=$(find . -path "*/build/app/outputs/flutter-apk/app-release.apk" | head -n 1)
          cp "$APK_PATH" dist/bouh-altadaris.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bouh-altadaris-apk
          path: dist/bouh-altadaris.apk
