name: bouh_supreme_udc_enterprise
description: Offline enterprise geological discovery engine for iOS and Android.
publish_to: 'none'
version: 4.0.0+2
environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.29.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  vector_math: ^2.3.0
flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/maps/
    - assets/kml/
    - assets/data/BOHUH_MASTER_PACKAGE.geojson
    - assets/data/targets_master.csv
    - assets/data/aoi_envelopes.csv
